{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Fitness App{% endblock title %}</title>
    <script src="{% static "js/htmx.min.js" %}"></script>
    <script src="{% static "js/messagehandling.js" %}"></script>
    {% comment %} <link rel="stylesheet" href="{% static "styles/styles.css" %}"> {% endcomment %}
</head>

<body>
    {% comment %} navbar {% endcomment %}
       <div id="message_container">
        {% if messages %}
            <div id='messages_container_inner'>
            {% for message in messages %}
                <div>
                    {{message}}
                </div>
            {% endfor %}    
            </div>
        {% endif %}
     </div>

     <div class="container">
        {% block content %}{% endblock content %}
     </div>
</body>
</html>
